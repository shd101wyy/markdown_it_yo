name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yo compiler
        run: npm install -g @shd101wyy/yo

      - name: Install JS test dependencies
        run: npm install

      - name: Build
        run: yo build

      - name: Unit tests
        run: yo build test

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM
        run: yo build wasm

      - name: Fixture tests & Benchmark
        run: |
          node scripts/run_fixture_tests.js
          node benchmark/run.js
